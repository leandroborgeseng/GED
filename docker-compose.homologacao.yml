# Homologação: GED (Postgres + API + Web) + Paperless-ngx (Postgres + Redis + app).
# Uso:
#   docker compose -f docker-compose.homologacao.yml --env-file docker/homolog.env up -d --build
#
# Paperless: http://localhost:8001 — na primeira subida o contentor cria o admin com
# PAPERLESS_ADMIN_* abaixo (alinhado a docker/homolog.env). A API usa PAPERLESS_API_URL=http://paperless:8000 .

name: ged-homolog

networks:
  ged_hom:
    driver: bridge

volumes:
  ged_pg:
  paperless_pg:
  paperless_redis:
  paperless_data:
  paperless_media:
  paperless_export:
  paperless_consume:

services:
  postgres:
    image: postgres:16-alpine
    networks: [ged_hom]
    environment:
      POSTGRES_USER: ged
      POSTGRES_PASSWORD: ged
      POSTGRES_DB: ged
    ports:
      - '5432:5432'
    volumes:
      - ged_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ged -d ged']
      interval: 5s
      timeout: 5s
      retries: 15

  paperless_postgres:
    image: postgres:16-alpine
    networks: [ged_hom]
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    volumes:
      - paperless_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paperless -d paperless']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  paperless_broker:
    image: redis:8-alpine
    networks: [ged_hom]
    volumes:
      - paperless_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    networks: [ged_hom]
    hostname: paperless
    depends_on:
      paperless_postgres:
        condition: service_healthy
      paperless_broker:
        condition: service_healthy
    ports:
      - '8001:8000'
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_export:/usr/src/paperless/export
      - paperless_consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://paperless_broker:6379
      PAPERLESS_DBHOST: paperless_postgres
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:-homolog-dev-secret-change-in-prod}
      PAPERLESS_URL: http://localhost:8001
      PAPERLESS_TIME_ZONE: America/Sao_Paulo
      PAPERLESS_OCR_LANGUAGE: por
      PAPERLESS_ADMIN_USER: ${PAPERLESS_USERNAME:-admin}
      PAPERLESS_ADMIN_MAIL: ${PAPERLESS_ADMIN_MAIL:-admin@localhost}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_PASSWORD:-Admin123!}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q -O /dev/null http://127.0.0.1:8000/accounts/login/ || exit 1',
        ]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    networks: [ged_hom]
    ports:
      - '4000:4000'
    environment:
      PORT: '4000'
      DATABASE_URL: postgresql://ged:ged@postgres:5432/ged?schema=public
      JWT_SECRET: ${JWT_SECRET:-homolog-dev-jwt-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PAPERLESS_API_URL: http://paperless:8000
      PAPERLESS_USERNAME: ${PAPERLESS_USERNAME:-admin}
      PAPERLESS_PASSWORD: ${PAPERLESS_PASSWORD:-Admin123!}
    depends_on:
      postgres:
        condition: service_healthy
      paperless:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    networks: [ged_hom]
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    depends_on:
      - api
    restart: unless-stopped
