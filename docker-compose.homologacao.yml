# Ambiente completo de homologação: GED (Postgres + API + Web) + Mayan EDMS (Postgres + Redis + RabbitMQ + app).
# Arquitetura: processos separados na mesma rede Docker; a API fala com o Mayan por HTTP interno.
#
# Uso:
#   docker compose -f docker-compose.homologacao.yml --env-file docker/homolog.env up -d --build
#
# Primeira vez com o Mayan: acesse http://localhost:8001 , conclua o assistente e crie o superusuário
# com o mesmo login/senha definidos em docker/homolog.env (padrão admin / Admin123!).
# Confira o ID do tipo de documento em http://localhost:8001 (ou GET /api/v4/document_types/) e ajuste MAYAN_DOCUMENT_TYPE_ID se necessário.

name: ged-homolog

networks:
  ged_hom:
    driver: bridge

volumes:
  ged_pg:
  mayan_pg:
  mayan_rabbitmq_data:
  mayan_redis_data:
  mayan_app:

services:
  postgres:
    image: postgres:16-alpine
    networks: [ged_hom]
    environment:
      POSTGRES_USER: ged
      POSTGRES_PASSWORD: ged
      POSTGRES_DB: ged
    ports:
      - '5432:5432'
    volumes:
      - ged_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ged -d ged']
      interval: 5s
      timeout: 5s
      retries: 15

  mayan_postgres:
    image: postgres:15-alpine
    networks: [ged_hom]
    shm_size: 128m
    environment:
      POSTGRES_DB: mayan
      POSTGRES_USER: mayan
      POSTGRES_PASSWORD: mayandbpass
    volumes:
      - mayan_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mayan -d mayan']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mayan_rabbitmq:
    image: rabbitmq:4-management-alpine
    networks: [ged_hom]
    hostname: mayan_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: mayan
      RABBITMQ_DEFAULT_PASS: mayanrabbitpass
      RABBITMQ_DEFAULT_VHOST: mayan
    volumes:
      - mayan_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 15s
      timeout: 30s
      retries: 8
      start_period: 40s

  mayan_redis:
    image: redis:7-alpine
    networks: [ged_hom]
    hostname: mayan_redis
    command:
      - redis-server
      - --appendonly
      - 'no'
      - --databases
      - '3'
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ''
      - --requirepass
      - mayanredispassword
    volumes:
      - mayan_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'mayanredispassword', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  mayan:
    image: mayanedms/mayanedms:s4.11
    networks: [ged_hom]
    hostname: mayan
    depends_on:
      mayan_postgres:
        condition: service_healthy
      mayan_rabbitmq:
        condition: service_healthy
      mayan_redis:
        condition: service_healthy
    ports:
      - '8001:8000'
    environment:
      MAYAN_DOCKER_WAIT: 'mayan_postgres:5432 mayan_rabbitmq:5672 mayan_redis:6379'
      MAYAN_CELERY_BROKER_URL: amqp://mayan:mayanrabbitpass@mayan_rabbitmq:5672/mayan
      MAYAN_CELERY_RESULT_BACKEND: redis://:mayanredispassword@mayan_redis:6379/1
      MAYAN_DATABASES: "{'default':{'ENGINE':'django.db.backends.postgresql','NAME':'mayan','PASSWORD':'mayandbpass','USER':'mayan','HOST':'mayan_postgres','PORT':5432,'CONN_MAX_AGE':0}}"
      MAYAN_LOCK_MANAGER_BACKEND: mayan.apps.lock_manager.backends.redis_lock.RedisLock
      MAYAN_LOCK_MANAGER_BACKEND_ARGUMENTS: "{'redis_url':'redis://:mayanredispassword@mayan_redis:6379/2'}"
    volumes:
      - mayan_app:/var/lib/mayan
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'exec /opt/mayan-edms/bin/python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/'', timeout=5)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    networks: [ged_hom]
    ports:
      - '4000:4000'
    environment:
      PORT: '4000'
      DATABASE_URL: postgresql://ged:ged@postgres:5432/ged?schema=public
      JWT_SECRET: ${JWT_SECRET:-homolog-dev-jwt-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      MAYAN_API_URL: http://mayan:8000/api/v4
      MAYAN_USERNAME: ${MAYAN_USERNAME:-admin}
      MAYAN_PASSWORD: ${MAYAN_PASSWORD:-Admin123!}
      MAYAN_DOCUMENT_TYPE_ID: ${MAYAN_DOCUMENT_TYPE_ID:-1}
    depends_on:
      postgres:
        condition: service_healthy
      mayan:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    networks: [ged_hom]
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    depends_on:
      - api
    restart: unless-stopped
