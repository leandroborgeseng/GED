# Config-as-code na raiz = mesmo conteúdo que a API (compatibilidade).
# Para vários serviços no mesmo repo, em cada serviço define o path do ficheiro em Settings:
#   API:       /apps/backend/railway.toml
#   Web:       /apps/frontend/railway.toml
#   Mayan:     /docker/mayan/railway.toml
# Guia completo: docs/railway-setup.md
#
# No Railway: crie um projeto, conecte o GitHub (repo GED), adicione PostgreSQL e dois serviços a partir do mesmo repo:
#
# 1) Serviço "api" (este arquivo costuma ser detectado na raiz; se não, configure manualmente):
#    - Build: Dockerfile → apps/backend/Dockerfile
#    - Root directory: vazio (raiz do repo), para o contexto do Docker incluir apps/backend/
#    - OBRIGATÓRIO no serviço da API: DATABASE_URL=${{ NomeDoPostgres.DATABASE_URL }} (Reference Variable).
#      O Railway NÃO injeta o Postgres na API sozinho — sem isso: P1012 ao iniciar (prisma migrate deploy).
#    - OBRIGATÓRIO: JWT_SECRET (string longa). Sem isso: erro ao subir o Nest (ConfigService JWT_SECRET).
#    - Veja railway.env.example para um modelo de variáveis.
#    - JWT_SECRET, CORS_ORIGIN (URL pública do frontend), MAYAN_* quando houver Mayan.
#
# 2) Serviço "web" (segundo serviço; configure no painel — não há segundo railway.toml na raiz):
#    - Build: Dockerfile → apps/frontend/Dockerfile
#    - Root directory: raiz do repo
#    - Build variável / arg: NEXT_PUBLIC_API_URL=https://<sua-api>.up.railway.app/api
#    - Após o deploy da API, copie a URL pública e defina NEXT_PUBLIC_API_URL antes do build do frontend.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/backend/Dockerfile"

[deploy]
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
