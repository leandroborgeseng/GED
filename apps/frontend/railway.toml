# Serviço: Web Next.js. No painel Railway → Settings → Config-as-code path: /apps/frontend/railway.toml
# Contexto Docker: raiz do monorepo. Root directory do serviço: vazio.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/frontend/Dockerfile"
watchPatterns = ["/apps/frontend/**", "/packages/ui/**", "/packages/types/**"]

[deploy]
# Imagem standalone: não há `next` no PATH — evita inferência `npm run start -w frontend`.
startCommand = "node apps/frontend/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
